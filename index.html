<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!-- Ensures proper scaling for mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Miller Documents</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #000000;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            /* Prevents text selection while tapping */
            -webkit-tap-highlight-color: transparent;
        }

        header {
            width: 100%;
            text-align: center;
            padding: 20px 0;
            border-bottom: 2px solid #333;
        }

        .logo {
            width: 100px;
            height: auto;
            margin-bottom: 10px;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        h1 {
            margin: 0;
            font-size: 1.5rem;
            letter-spacing: 1px;
            color: #ffffff; /* Updated to white */
        }

        .container {
            display: grid;
            /* Restored original grid flow */
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            padding: 20px;
            width: 100%;
            max-width: 600px;
            box-sizing: border-box;
        }

        .doc-link {
            text-decoration: none;
            color: #fff;
            text-align: center;
            /* Restored original padding */
            padding: 25px 10px;
            border-radius: 15px;
            background-color: #111;
            transition: background-color 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #222;
        }

        /* Hover effect only on desktop, prevents "sticky" hover on mobile */
        @media (hover: hover) {
            .doc-link:hover {
                background-color: #222;
            }
        }

        .icon {
            font-size: 50px;
            margin-bottom: 10px;
            display: block;
        }

        .label {
            font-weight: bold;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <img src="Images/Logo.PNG" alt="Company Logo" class="logo">
        <h1>Miller Documents</h1>
    </header>

    <div class="container">
        <a href="JHA.html" class="doc-link">
            <span class="icon">⚠️</span>
            <span class="label">JHA</span>
        </a>
        <a href="WHR.html" class="doc-link">
            <span class="icon">📋</span>
            <span class="label">WHR</span>
        </a>
        <a href="HotelReport.html" class="doc-link">
            <span class="icon">📝</span>
            <span class="label">Hotel Report</span>
        </a>
        <a href="Op.html" class="doc-link">
            <span class="icon">📝</span>
            <span class="label">Op</span>
        </a>
        <a href="OpSummary.html" class="doc-link">
            <span class="icon">📊</span>
            <span class="label">OpSummary</span>
        </a>
        <a href="Toolbox.html" class="doc-link">
            <span class="icon">🧰</span>
            <span class="label">Toolbox</span>
        </a>
        <a href="Hotels.html" class="doc-link">
            <span class="icon">🏨</span>
            <span class="label">Hotel List</span>
        </a>
    </div>

</body>
</html>
