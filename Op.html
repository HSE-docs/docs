<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* ORIGINAL DESIGN - FULL SIZE FOR SCREEN */
        body { font-family: sans-serif; font-size: 11pt; margin: 0; padding: 20px; line-height: 1.2; color: #000; padding-bottom: 80px; }
        .container { max-width: 800px; margin: auto; padding: 10px; }

        h2 { text-align: center; text-decoration: underline; font-size: 16pt; margin-bottom: 20px; }
        h3 { font-size: 12pt; margin: 10px 0 5px 0; border-bottom: 1px solid #000; padding-bottom: 2px; }
        
        .row { display: flex; align-items: baseline; margin-bottom: 4px; }
        .row label { font-weight: bold; margin-right: 8px; font-size: 10pt; white-space: nowrap; }
        .row input { flex-grow: 1; border: none; border-bottom: 1px solid #000; padding: 2px; }
        
        table { width: 100%; border-collapse: collapse; margin: 10px 0; }
        th, td { border: 1px solid #000; padding: 4px; text-align: center; font-size: 10pt; }
        th { background-color: #f2f2f2; }
        
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 15px; }
        .ops-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .footer { text-align: center; margin-top: 25px; font-size: 9pt; color: #555; }
        .comment-line { border-bottom: 1px solid #000; height: 18px; margin-top: 8px; }
        
        /* Floating Panel Styles */
        .floating-action-panel { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); padding: 10px; border-top: 1px solid #c6c6c8; z-index: 9999; display: flex; gap: 8px; justify-content: center; }
        .action-btn { flex: 1; max-width: 120px; border: none; border-radius: 8px; padding: 12px; font-weight: 600; font-size: 13px; color: white; cursor: pointer; }
        .btn-print { background-color: #007aff; }
        .btn-clear { background-color: #ff3b30; }
        .btn-back { background-color: #8e8e93; }
        .btn-share { background-color: #5856d6; }

        /* PRINT SETTINGS */
        @media print {
            .floating-action-panel { display: none !important; }
            @page { size: A4; margin: 5mm; }
            body { font-size: 8.5pt; }
            h2 { font-size: 13pt; margin-bottom: 5px; }
            h3 { font-size: 10pt; margin: 5px 0 2px 0; }
            .row label { font-size: 8.5pt; }
            th, td { font-size: 8.5pt; padding: 2px; }
            .comment-line { height: 14px; margin-top: 5px; }
            .footer { font-size: 7pt; margin-top: 10px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>OPERATIONS - DAILY PRODUCTION REPORT</h2>

        <div class="header-grid">
            <div>
                <div class="row"><label>DATE:</label><input type="date" style="border:none; border-bottom: 1px solid #000; flex-grow:1;"></div>
                <div class="row"><label>PLANNED QUANTITIES:</label><input type="text"></div>
                <div class="row"><label>ACTUAL QTY:</label><input type="text"></div>
                <div class="row"><label>PRODUCTION HOURS:</label><input type="text"></div>
            </div>
            <div>
                <div class="row"><label>LOCATION:</label><input type="text"></div>
                <div class="row"><label>PLANNED START:</label><input type="text"></div>
                <div class="row"><label>ACTUAL START:</label><input type="text"></div>
                <div class="row"><label>SHIFT HOURS:</label><input type="text"></div>
            </div>
        </div>

        <div class="row">
            <label><b>START / STOP TIMES</b></label>
            <label>Shift Start</label><input type="text" style="flex: 0 0 80px;">
            <label>Shift end</label><input type="text" style="flex: 0 0 80px;">
        </div>

        <table>
            <tr><th style="width: 15%;">DOWNTIME</th><th style="width: 45%;">REASON</th><th style="width: 20%;">START TIME</th><th style="width: 20%;">STOP TIME</th></tr>
            <tr><td>1</td><td><input type="text" style="width:95%"></td><td><input type="text" style="width:90%"></td><td><input type="text" style="width:90%"></td></tr>
            <tr><td>2</td><td><input type="text" style="width:95%"></td><td><input type="text" style="width:90%"></td><td><input type="text" style="width:90%"></td></tr>
            <tr><td>3</td><td><input type="text" style="width:95%"></td><td><input type="text" style="width:90%"></td><td><input type="text" style="width:90%"></td></tr>
            <tr><td>4</td><td><input type="text" style="width:95%"></td><td><input type="text" style="width:90%"></td><td><input type="text" style="width:90%"></td></tr>
            <tr><td>5</td><td><input type="text" style="width:95%"></td><td><input type="text" style="width:90%"></td><td><input type="text" style="width:90%"></td></tr>
            <tr><td>6</td><td><input type="text" style="width:95%"></td><td><input type="text" style="width:90%"></td><td><input type="text" style="width:90%"></td></tr>
            <tr><td>7</td><td><input type="text" style="width:95%"></td><td><input type="text" style="width:90%"></td><td><input type="text" style="width:90%"></td></tr>
        </table>

        <h3>DAILY WASTE</h3>
        <div class="row"><label>Material Waste:</label><input type="text" style="flex: 0 0 150px;"><span>Tonnes/m3/returns</span></div>
        <div class="row"><label>Start/Stop Waste:</label><input type="text" style="flex: 0 0 150px;"><span>hrs/minutes</span></div>

        <h3>QUANTITIES</h3>
        <div class="ops-grid">
            <div>
                <div class="row"><label>Pave:</label><input type="text"></div>
                <div class="row"><label>Aggregates:</label><input type="text"></div>
                <div class="row"><label>Concrete:</label><input type="text"></div>
                <div class="row"><label>Milling:</label><input type="text"></div>
                <div class="row"><label>Micro Surf.:</label><input type="text"></div>
                <div class="row"><label>Chip Seal:</label><input type="text"></div>
            </div>
            <div>
                <div class="row"><label>Ditching:</label><input type="text"></div>
                <div class="row"><label>Pipework:</label><input type="text"></div>
                <div class="row"><label>Tack:</label><input type="text"></div>
                <div class="row"><label>Grading:</label><input type="text"></div>
                <div class="row"><label>PDR/FDR:</label><input type="text"></div>
                <div class="row"><label>Other:</label><input type="text"></div>
            </div>
        </div>

        <h3>COMMENTS:</h3>
        <div class="comment-line"><input type="text" style="width:100%; border:none; background:transparent;"></div>
        <div class="comment-line"><input type="text" style="width:100%; border:none; background:transparent;"></div>
        <div class="comment-line"><input type="text" style="width:100%; border:none; background:transparent;"></div>
        <div class="comment-line"><input type="text" style="width:100%; border:none; background:transparent;"></div>

        <div class="footer">C2 - COLAS GROUP INTERNAL: Employees and partners who need to know.</div>
    </div>

    <div class="floating-action-panel">
        <button type="button" class="action-btn btn-back" onclick="window.location.href='index.html'">Back</button>
        <button type="button" class="action-btn btn-clear" onclick="clearAllData()">Clear</button>
        <button type="button" class="action-btn btn-print" onclick="window.print()">Print</button>
        <button type="button" class="action-btn btn-share" onclick="shareForm()">Share</button>
    </div>

    <script>
        function clearAllData() {
            if(confirm("Are you sure you want to clear this report?")) {
                document.querySelectorAll('input').forEach(el => {
                    if(el.type !== 'button') el.value = '';
                });
            }
        }

        function shareForm() {
            if (navigator.share) {
                navigator.share({
                    title: document.title,
                    text: 'Operations - Daily Production Report',
                    url: window.location.href
                }).catch(console.error);
            } else {
                alert("Sharing not supported on this device. Use Print to Save as PDF.");
            }
        }
    </script>
</body>
</html>
