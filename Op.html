<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { font-family: sans-serif; font-size: 10pt; margin: 0; padding: 10px; line-height: 1.1; color: #000; }
        .container { max-width: 800px; margin: auto; }
        h2 { text-align: center; text-decoration: underline; font-size: 14pt; margin: 5px 0 10px 0; }
        h3 { font-size: 11pt; margin: 8px 0 2px 0; border-bottom: 1px solid #000; padding-bottom: 1px; }
        .row { display: flex; align-items: baseline; margin-bottom: 2px; }
        .row label { font-weight: bold; margin-right: 6px; font-size: 10pt; white-space: nowrap; }
        .row input { flex-grow: 1; border: none; border-bottom: 1px solid #000; padding: 1px; font-size: 11pt; }
        .start-stop-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; }
        .start-stop-right { display: flex; align-items: baseline; gap: 15px; }
        .start-stop-right .input-wrapper { display: flex; align-items: baseline; }
        .start-stop-right input { width: 180px; border: none; border-bottom: 1px solid #000; padding: 1px; font-size: 11pt; }
        table { width: 100%; border-collapse: collapse; margin: 5px 0; }
        th, td { border: 1px solid #000; padding: 2px; text-align: center; font-size: 10pt; }
        th { background-color: #f2f2f2; }
        table input { width: 95%; border: none; background: transparent; text-align: center; font-size: 10pt; }
        .header-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .ops-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .footer { text-align: center; margin-top: 10px; font-size: 8pt; color: #555; }
        .comment-line { border-bottom: 1px solid #000; height: 18px; margin-top: 5px; }
        .floating-action-panel { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); padding: 10px; border-top: 1px solid #c6c6c8; z-index: 9999; display: flex; gap: 8px; justify-content: center; }
        .action-btn { flex: 1; max-width: 120px; border: none; border-radius: 8px; padding: 10px; font-weight: 600; font-size: 12px; color: white; cursor: pointer; }
        .btn-print { background-color: #007aff; }
        .btn-clear { background-color: #ff3b30; }
        .btn-back { background-color: #8e8e93; }
        .btn-share { background-color: #5856d6; }
        @media print {
            .floating-action-panel { display: none !important; }
            @page { size: A4; margin: 5mm; }
            body { font-size: 9pt; }
            .container { padding: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>OPERATIONS - DAILY PRODUCTION REPORT</h2>

        <div class="header-grid">
            <div>
                <div class="row"><label>DATE:</label><input type="date" id="date"></div>
                <div class="row"><label>PLANNED QTY:</label><input type="text" id="p-qty"></div>
                <div class="row"><label>ACTUAL QTY:</label><input type="text" id="a-qty"></div>
                <div class="row"><label>PROD HOURS:</label><input type="text" id="p-hours"></div>
            </div>
            <div>
                <div class="row"><label>LOCATION:</label><input type="text" id="loc"></div>
                <div class="row"><label>PLAN START:</label><input type="text" id="p-start"></div>
                <div class="row"><label>ACTUAL START:</label><input type="text" id="a-start"></div>
                <div class="row"><label>SHIFT HRS:</label><input type="text" id="s-hours"></div>
            </div>
        </div>

        <div class="start-stop-row">
            <label><b>START/STOP TIMES:</b></label>
            <div class="start-stop-right">
                <div class="input-wrapper"><label>Shift Start</label><input type="text" id="s-start"></div>
                <div class="input-wrapper"><label>Shift Stop</label><input type="text" id="s-stop"></div>
            </div>
        </div>

        <table>
            <tr><th style="width: 10%;">#</th><th style="width: 50%;">REASON</th><th style="width: 20%;">START</th><th style="width: 20%;">STOP</th></tr>
            <tr><td>1</td><td><input type="text" id="r1"></td><td><input type="text" id="t1s"></td><td><input type="text" id="t1e"></td></tr>
            <tr><td>2</td><td><input type="text" id="r2"></td><td><input type="text" id="t2s"></td><td><input type="text" id="t2e"></td></tr>
            <tr><td>3</td><td><input type="text" id="r3"></td><td><input type="text" id="t3s"></td><td><input type="text" id="t3e"></td></tr>
            <tr><td>4</td><td><input type="text" id="r4"></td><td><input type="text" id="t4s"></td><td><input type="text" id="t4e"></td></tr>
            <tr><td>5</td><td><input type="text" id="r5"></td><td><input type="text" id="t5s"></td><td><input type="text" id="t5e"></td></tr>
            <tr><td>6</td><td><input type="text" id="r6"></td><td><input type="text" id="t6s"></td><td><input type="text" id="t6e"></td></tr>
            <tr><td>7</td><td><input type="text" id="r7"></td><td><input type="text" id="t7s"></td><td><input type="text" id="t7e"></td></tr>
        </table>

        <h3>DAILY WASTE</h3>
        <div class="row"><label>Material Waste:</label><input type="text" id="waste1" style="flex: 0 0 150px;"></div>
        <div class="row"><label>Start/Stop Waste:</label><input type="text" id="waste2" style="flex: 0 0 150px;"></div>

        <h3>QUANTITIES</h3>
        <div class="ops-grid">
            <div>
                <div class="row"><label>Pave:</label><input type="text" id="q1"></div>
                <div class="row"><label>Aggregates:</label><input type="text" id="q2"></div>
                <div class="row"><label>Concrete:</label><input type="text" id="q3"></div>
                <div class="row"><label>Milling:</label><input type="text" id="q4"></div>
                <div class="row"><label>Micro Surf.:</label><input type="text" id="q5"></div>
                <div class="row"><label>Chip Seal:</label><input type="text" id="q6"></div>
            </div>
            <div>
                <div class="row"><label>Ditching:</label><input type="text" id="q7"></div>
                <div class="row"><label>Pipework:</label><input type="text" id="q8"></div>
                <div class="row"><label>Tack:</label><input type="text" id="q9"></div>
                <div class="row"><label>Grading:</label><input type="text" id="q10"></div>
                <div class="row"><label>PDR/FDR:</label><input type="text" id="q11"></div>
                <div class="row"><label>Other:</label><input type="text" id="q12"></div>
            </div>
        </div>

        <h3>COMMENTS:</h3>
        <div class="comment-line"><input type="text" id="c1" style="width:100%; border:none; background:transparent; font-size:11pt;"></div>
        <div class="comment-line"><input type="text" id="c2" style="width:100%; border:none; background:transparent; font-size:11pt;"></div>
        <div class="comment-line"><input type="text" id="c3" style="width:100%; border:none; background:transparent; font-size:11pt;"></div>
        <div class="comment-line"><input type="text" id="c4" style="width:100%; border:none; background:transparent; font-size:11pt;"></div>

        <div class="footer">C2 - COLAS GROUP INTERNAL: Employees and partners who need to know.</div>
    </div>

    <div class="floating-action-panel">
        <button type="button" class="action-btn btn-back" onclick="window.location.href='index.html'">Back</button>
        <button type="button" class="action-btn btn-clear" onclick="clearAllData()">Clear</button>
        <button type="button" class="action-btn btn-print" onclick="window.print()">Print</button>
        <button type="button" class="action-btn btn-share" onclick="shareForm()">Share</button>
    </div>

    <script>
        // Load data on start
        document.querySelectorAll('input').forEach(el => {
            if (el.id) el.value = localStorage.getItem(el.id) || '';
        });

        // Save data on change
        document.querySelectorAll('input').forEach(el => {
            el.addEventListener('input', () => {
                if (el.id) localStorage.setItem(el.id, el.value);
            });
        });

        function clearAllData() {
            if(confirm("Are you sure you want to clear this report?")) {
                localStorage.clear();
                location.reload();
            }
        }
        function shareForm() {
            if (navigator.share) {
                navigator.share({title: document.title, url: window.location.href}).catch(console.error);
            } else {
                alert("Sharing not supported. Use Print to Save as PDF.");
            }
        }
    </script>
</body>
</html>
