<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hotel Tracker</title>
    <style>
        body { font-family: sans-serif; padding: 10px; padding-bottom: 80px; }
        h2 { text-align: center; margin: 10px 0; font-size: 1.2em; }
        
        table { width: 100%; max-width: 1000px; margin: auto; border-collapse: collapse; }
        
        .example-label { font-weight: bold; font-size: 0.7em; text-align: left; padding: 2px 0; border: none; }
        
        .example-data td { border: 1px solid #000; padding: 0; background-color: #fbfbfb; }
        .example-data input { 
            background: transparent; border: none; width: 100%; padding: 2px; 
            font-style: italic; box-sizing: border-box; text-align: center; font-size: 11pt; font-weight: bold;
        }

        .spacer-row { height: 10px; }

        th { font-weight: bold; padding: 0 2px; vertical-align: bottom; text-align: center; height: 24px; border: none; }
        th span { border-bottom: 2px solid #000; display: inline-block; white-space: nowrap; font-size: 0.8em; }
        .small-font { font-size: 0.6em !important; }

        td { padding: 0; border: 1px solid #000; }
        .cell-input { 
            width: 100%; border: none; padding: 2px; box-sizing: border-box; 
            outline: none; display: block; font-size: 10pt; font-weight: bold; 
        }

        /* Column widths */
        th:nth-child(1), td:nth-child(1) { width: 12%; }
        th:nth-child(2), td:nth-child(2) { width: 15%; }
        th:nth-child(3), td:nth-child(3) { width: 15%; }
        th:nth-child(4), td:nth-child(4) { width: 28%; }
        th:nth-child(5), td:nth-child(5) { width: 20%; }
        th:nth-child(6), td:nth-child(6) { width: 10%; }

        .floating-action-panel { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(15px); padding: 8px; border-top: 1px solid #c6c6c8; z-index: 9999; display: flex; gap: 5px; justify-content: center; }
        .action-btn { flex: 1; max-width: 100px; border: none; border-radius: 6px; padding: 8px; font-weight: 600; font-size: 12px; color: white; cursor: pointer; }
        .btn-print { background-color: #007aff; } .btn-clear { background-color: #ff3b30; } .btn-back { background-color: #8e8e93; } .btn-share { background-color: #5856d6; }

        /* PRINT SETTINGS FOR SINGLE PAGE */
        @media print {
            .floating-action-panel { display: none !important; }
            body { padding: 0; }
            table { font-size: 9pt; }
            .cell-input { font-size: 9pt; padding: 1px; }
            @page { size: A4 portrait; margin: 10mm; }
        }
    </style>
</head>
<body>

    <h2>HOTEL TRACKER</h2>

    <table>
        <thead>
            <tr><td colspan="6" class="example-label">EXAMPLE</td></tr>
            <tr class="example-data">
                <td><input type="text" value="2026-06-01" readonly></td>
                <td><input type="text" value="Holiday Inn" readonly></td>
                <td><input type="text" value="Saint John" readonly></td>
                <td><input type="text" value="Steve and Tom" readonly></td>
                <td><input type="text" value="700001" readonly></td>
                <td><input type="text" readonly></td>
            </tr>
            <tr class="spacer-row"><td colspan="6" style="border:none;"></td></tr>
            <tr>
                <th><span>Date</span></th><th><span>Hotel Name</span></th><th><span>Hotel Location</span></th>
                <th><span>Name of Employee(s) in Room</span></th><th class="small-font"><span>Job Number or GL code</span></th><th><span>INVOICE</span></th>
            </tr>
        </thead>
        <tbody id="grid-body"></tbody>
    </table>

    <div class="floating-action-panel">
        <button type="button" class="action-btn btn-back" onclick="window.history.back()">Back</button>
        <button type="button" class="action-btn btn-clear" onclick="clearAllData()">Clear</button>
        <button type="button" class="action-btn btn-print" onclick="window.print()">Print</button>
        <button type="button" class="action-btn btn-share" onclick="shareForm()">Share</button>
    </div>

    <script>
        const tbody = document.getElementById('grid-body');
        // Reduced to 30 rows to fit comfortably on one page
        for (let i = 0; i < 30; i++) {
            let row = document.createElement('tr');
            for (let j = 0; j < 6; j++) {
                let cell = document.createElement('td');
                let input = document.createElement('input');
                input.className = 'cell-input';
                input.id = `r${i}c${j}`;
                input.type = (j === 0) ? 'date' : 'text';
                input.oninput = saveData;
                cell.appendChild(input);
                row.appendChild(cell);
            }
            tbody.appendChild(row);
        }

        function saveData() {
            let data = {};
            document.querySelectorAll('.cell-input').forEach(input => data[input.id] = input.value);
            localStorage.setItem('hotelTrackerData', JSON.stringify(data));
        }

        function loadData() {
            let saved = JSON.parse(localStorage.getItem('hotelTrackerData'));
            if (saved) {
                Object.keys(saved).forEach(id => {
                    let el = document.getElementById(id);
                    if (el) el.value = saved[id];
                });
            }
        }

        function clearAllData() {
            if(confirm("Are you sure you want to clear this report?")) {
                localStorage.removeItem('hotelTrackerData');
                document.querySelectorAll('.cell-input').forEach(el => el.value = '');
            }
        }

        function shareForm() {
            if (navigator.share) {
                navigator.share({title: 'Hotel Tracker', url: window.location.href}).catch(console.error);
            } else { alert("Sharing not supported. Use Print to Save as PDF."); }
        }

        window.onload = loadData;
    </script>
</body>
</html>
