<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Journal</title>
    <style>
        body { font-family: sans-serif; margin: 20px; padding-bottom: 80px; color: black; }
        table { 
            width: 100%; border-collapse: collapse; margin-top: 20px; 
            table-layout: fixed; border: 1px solid #333; color: black; 
        }
        td { border: 1px solid #333; padding: 0; height: 37.5px; vertical-align: top; }
        
        textarea { 
            width: 100%; height: 100%; border: none; 
            padding: 2px; box-sizing: border-box; outline: none; 
            font-size: 10px; font-weight: bold; color: black; 
            background-color: transparent; font-style: italic; 
            text-align: left; resize: none; overflow: hidden;
            font-family: sans-serif;
        }

        /* Dropdown styling with black text */
        select { 
            border: none; padding: 2px; font-size: 10px; 
            font-weight: bold; background-color: transparent;
            font-style: italic; cursor: pointer; color: black; /* Explicitly black */
        }
        select option { color: black; }

        .date-cell-container { 
            display: flex; align-items: center; justify-content: center; 
            width: 100%; height: 100%; 
        }
        .slash-separator { font-size: 10px; font-weight: bold; padding: 0 2px; color: black; }
        
        th { 
            border: 1px solid #333; padding: 2px; background-color: transparent; 
            text-align: center; font-size: 8px; height: auto; color: black; 
        }
        .journal-cell { text-align: center; font-weight: bold; font-size: 10px; height: 18.75px; color: black; }
        
        .day-label { 
            font-weight: bold; width: 107px; font-size: 10px; height: 46.875px; 
            color: black; text-align: center; line-height: 46.875px;
            vertical-align: middle; box-sizing: border-box;
        }

        /* Floating Action Panel */
        .floating-action-panel { 
            position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(15px); padding: 8px; border-top: 1px solid #c6c6c8; 
            z-index: 9999; display: flex; gap: 5px; justify-content: center; 
        }
        .action-btn { flex: 1; max-width: 100px; border: none; border-radius: 6px; padding: 8px; font-weight: 600; font-size: 12px; color: white; cursor: pointer; }
        .btn-print { background-color: #007aff; } .btn-clear { background-color: #ff3b30; } .btn-share { background-color: #5856d6; }
        @media print { .floating-action-panel { display: none !important; } }
    </style>
</head>
<body>
    
    <table>
        <colgroup>
            <col style="width: 65px;"><col style="width: 80px;"><col style="width: 80px;"><col style="width: 80px;">
            <col style="width: 80px;"><col style="width: 80px;"><col style="width: 76px;"><col style="width: auto;">
        </colgroup>
        <thead>
            <tr>
                <th>Date</th><th>Activity/Location</th><th>Planned Start Time</th><th>Planned Quantity</th>
                <th>Actual Start Time</th><th>Actual End Time</th><th>Actual Quantity</th><th>Comments</th>
            </tr>
        </thead>
        <tbody id="grid-body"></tbody>
    </table>

    <div class="floating-action-panel">
        <button type="button" class="action-btn" style="background: #8e8e93" onclick="window.history.back()">Back</button>
        <button type="button" class="action-btn btn-clear" onclick="clearAllData()">Clear</button>
        <button type="button" class="action-btn btn-print" onclick="window.print()">Print</button>
        <button type="button" class="action-btn btn-share" onclick="shareForm()">Share</button>
    </div>

    <script>
        const tbody = document.getElementById('grid-body');
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        for (let i = 0; i < 7; i++) {
            let row = document.createElement('tr');
            for (let j = 0; j < 8; j++) {
                let cell = document.createElement('td');
                if (j === 0) {
                    cell.innerHTML = `<div class="date-cell-container"><select id="r${i}m"><option value="" disabled selected>MM</option>${months.map(m=>`<option value="${m}">${m}</option>`).join('')}</select><span class="slash-separator">/</span><select id="r${i}d"><option value="" disabled selected>DD</option>${Array.from({length:31}, (_,k)=>`<option value="${k+1}">${k+1}</option>`).join('')}</select></div>`;
                } else {
                    cell.innerHTML = `<textarea class="cell-input" id="r${i}c${j}"></textarea>`;
                }
                row.appendChild(cell);
            }
            tbody.appendChild(row);
        }

        const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday", "Sunday"];
        tbody.innerHTML += `<tr><td colspan="8" class="journal-cell">Daily Journal</td></tr>`;
        days.forEach((day, i) => {
            tbody.innerHTML += `<tr><td class="day-label">${day}</td><td colspan="7"><textarea class="cell-input" id="journal${i}"></textarea></td></tr>`;
        });

        function saveData() {
            let data = {};
            document.querySelectorAll('textarea, select').forEach(el => data[el.id] = el.value);
            localStorage.setItem('journalData', JSON.stringify(data));
        }
        document.addEventListener('input', saveData);
        document.addEventListener('change', saveData);

        function loadData() {
            let saved = JSON.parse(localStorage.getItem('journalData'));
            if (saved) Object.keys(saved).forEach(id => {
                let el = document.getElementById(id);
                if (el) el.value = saved[id];
            });
        }
        window.onload = loadData;
        
        function clearAllData() {
            if(confirm("Clear all data?")) {
                localStorage.removeItem('journalData');
                document.querySelectorAll('textarea, select').forEach(el => el.value = '');
            }
        }

        function shareForm() {
            if (navigator.share) navigator.share({title: 'Daily Journal', url: window.location.href}).catch(console.error);
            else alert("Sharing not supported.");
        }
    </script>
</body>
</html>
